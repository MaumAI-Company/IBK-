syntax="proto3";

package maum.brain.mcc;
import "proto/mcc.proto";
import "google/protobuf/empty.proto";

service MccEngineController {
    rpc CheckEngineStatus(google.protobuf.Empty) returns (ControlResponse);
    rpc StartTraining(TrainingParams) returns (ControlResponse);
    rpc CheckModelStatus(ModelInformation) returns (ModelStatus);
    rpc StopTraining(google.protobuf.Empty) returns (ControlResponse);
    rpc ReplaceModel(ReplaceModelRequest) returns (ControlResponse);
    rpc WrappedInference(mcc.TextClassificationRequest) returns (InferenceResponse);
}


/* Model Management */
enum EngineStatus {
    IDLE = 0;
    INFERENCE_READY = 1;
    TRAINING = 2;
    REPLACING = 3;
}

enum RequestResult {
    SUCCESS = 0;
    FAIL = 1;
	INVALID_REQUEST = 15;
}

message TrainingParams {
    string model_name = 1;
    string train_file = 2;
    string dev_file = 3;
    int32 train_batch_size = 4;
    float learning_rate = 5;
    int32 num_train_epochs = 6;
    string sep_document = 7;
    string sep_sentence = 8;
}

message ControlResponse {
    RequestResult result_code = 1;
    EngineStatus engine_status = 2;
    string msg = 3;
}

message ModelInformation {
    string model_name = 1;
}

message ModelStatus {
    int32 total_steps = 1;
    int32 cur_step = 2;
    repeated TestResult test_results = 3;
}

message TestResult {
    string category = 1;
    float score_f1 = 2;
    float score_precision = 3;
    float score_recall = 4;
}

message ReplaceModelRequest {
    string model_name = 1;
    string target_label = 2;
    float threshold = 3;
}

message InferenceResponse {
    RequestResult result_code = 1;
    mcc.MultiCategoryLabelResponse outputs = 2;
}
