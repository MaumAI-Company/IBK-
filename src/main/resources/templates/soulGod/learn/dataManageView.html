    <style>

        @media screen and (max-width: 1851px) {
            .tbl_wrap {
                width: 100%;
                overflow-x: auto;
                white-space: nowrap
            }

            .tbl_list {
                width: auto
            }
        }

        #popLearnData .check_wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px
        }

        #popLearnData .check_wrap .checkbox {
            width: calc((100% - 16px) / 3)
        }

        .txt_guide {
            margin-top: 8px;
        }

        .mtz-monthpicker-year {
            background: #fff url('data:image/svg+xml,%3Csvg xmlns="http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg" width="20" height="20" preserveAspectRatio="xMidYMid meet" viewBox="0 0 24 24"%3E%3Cpath fill="%236d7175" d="M17 9.17a1 1 0 0 0-1.41 0L12 12.71L8.46 9.17a1 1 0 0 0-1.41 0a1 1 0 0 0 0 1.42l4.24 4.24a1 1 0 0 0 1.42 0L17 10.59a1 1 0 0 0 0-1.42Z"%2F%3E%3C%2Fsvg%3E') no-repeat calc(100% - 11px) 50% / 20px auto
        }
    </style>
    <script type="text/javascript">
        $(function () {
            fn_setDatePicker('#stDt', {
                onShow: function (ct) {
                    this.setOptions({
                        maxDate: $('#edDt').val() ? $('#edDt').val() : false
                    })
                }
            });
            fn_setDatePicker('#edDt', {
                onShow: function (ct) {
                    this.setOptions({
                        minDate: $('#stDt').val() ? $('#stDt').val() : false
                    })
                }
            });

            //학습 팝업 도움말
            $('.btn_help').each(function () {
                $(this).on('click', function () {
                    $(this).parent('.th_help_area').toggleClass('active').parents('.tr').siblings('.tr').find('.th_help_area').removeClass('active');
                });
            });
            $(document).on('click', function (e) {
                if (!$(e.target).parents('div').hasClass('th_help_area')) {
                    $('.th_help_area').removeClass('active');
                }
            });

            $('[name=templateAt]').on('change', function (e) {
                if ($(this).val() === 'N') {
                    $('#templateName').prop('disabled', true);
                } else {
                    $('#templateName').prop('disabled', false);
                }
            })

            fn_setMonthPicker();

            fn_settingChip($('#searchJson').val());
            // TODO : chip 삭제 버튼 제거

            //검색일자 경고 문구
            $('.fc_error').hide();
        });

        function movePage(url, pageNo) {
            $('#currentPageNo').val(pageNo);
            $('#form1').attr({action: '/soulGod/learn/dataManage', method: 'post'}).unbind('submit').submit();
        }

        function fn_search() {
            if ($('#searchStartDate').val() > $('#searchEndDate').val()) {
                $('.fc_error').show();
                $('#searchStartDate').focus();
                return false;
            }
            fn_searchConditionSet();

            let frm = $('#form1');
            frm.prop('action', '?');
            frm.submit();
        }

        function fn_reset() {
            $('#searchStartDate').val('');
            $('#searchEndDate').val('');
            $('#searchTarget').val('').niceSelect('update');
            $('#searchType').val('').niceSelect('update');
            $('#searchKeyword').val('');
            $('#searchJson').val('');
            $('#searchTypeJson').val('');

            fn_search();
        }

    </script>
</head>
