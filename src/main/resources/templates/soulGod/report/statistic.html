        function fn_getStatisticInput(){
            $.ajax({
                url: "/soulGod/report/statistic/input",
                type: "post",
                async: false,
                data: null,
                dataType: "json",

                    console.log("input 대비", data);
                },
                error: function () {
                    //console.log("error");
                }
            });

        function fn_getStatisticOutput(){
            $.ajax({

                error: function () {
                    //console.log("error");
                }

        }

        am5.ready(function() {
            fn_drawChart1();
            fn_drawChart2();
        });
        function fn_drawChart1() {
            let root = am5.Root.new("chartdiv1");

            root.setThemes([
                am5themes_Animated.new(root)
            ]);

            let chart = root.container.children.push(am5xy.XYChart.new(root, {
                panX: false,
                panY: false,
                paddingLeft: 0,
                wheelX: "panX",
                wheelY: "zoomX",
                layout: root.verticalLayout
            }));


            let legend = chart.children.push(
                am5.Legend.new(root, {
                    centerX: am5.p50,
                    x: am5.p50
                })
            );

            let data = [{
                "year": "2024년 1월",
                "branch": 243,
                "head": 13,
                "all": 256,
                "per": 94.92
            }, {
                "year": "2024년 2월",
                "branch": 288,
                "head": 15,
                "all": 303,
                "per": 95.04
            }, {
                "year": "2024년 3월",
                "branch": 298,
                "head": 12,
                "all": 310,
                "per": 96.12
            }, {
                "year": "2024년 4월",
                "branch": 316,
                "head": 23,
                "all": 339,
                "per": 93.21
            }, {
                "year": "2024년 5월",
                "branch": 376,
                "head": 29,
                "all": 405,
                "per": 92.83
            }, {
                "year": "2024년 6월",
                "branch": 407,
                "head": 16,
                "all": 423,
                "per": 96.21
            }, {
                "year": "2024년 7월",
                "branch": 374,
                "head": 11,
                "all": 385,
                "per": 97.14
            }, {
                "year": "2024년 8월",
                "branch": 325,
                "head": 12,
                "all": 337,
                "per": 94.92
            }, {
                "year": "2024년 9월",
                "branch": 289,
                "head": 21,
                "all": 310,
                "per": 94.92
            }, {
                "year": "2024년 10월",
                "branch": 312,
                "head": 9,
                "all": 321,
                "per": 94.92
            }, {
                "year": "2024년 11월",
                "branch": 298,
                "head": 284,
                "all": 298,
                "per": 94.92
            }, {
                "year": "2024년 12월",
                "branch": 298,
                "head": 284,
                "all": 298,
                "per": 94.92
            }]

            let xRenderer = am5xy.AxisRendererX.new(root, {
                cellStartLocation: 0.1,
                cellEndLocation: 0.9,
                minorGridEnabled: true
            })

            let xAxis = chart.xAxes.push(am5xy.CategoryAxis.new(root, {
                categoryField: "year",
                renderer: xRenderer,
                tooltip: am5.Tooltip.new(root, {})
            }));

            xRenderer.grid.template.setAll({
                location: 1
            })

            xAxis.data.setAll(data);

            let yAxis = chart.yAxes.push(am5xy.ValueAxis.new(root, {
                renderer: am5xy.AxisRendererY.new(root, {
                    strokeOpacity: 0.1
                })
            }));

            function makeSeries1(name, fieldName) {
                let series;
                if(fieldName != 'all'){
                    series = chart.series.push(am5xy.ColumnSeries.new(root, {
                        name: name,
                        xAxis: xAxis,
                        yAxis: yAxis,
                        valueYField: fieldName,
                        categoryXField: "year"
                    }));
                }

                if (series) {
                    series.columns.template.setAll({
                        tooltipText: "{valueY}개 / {per}%",
                        width: am5.percent(90),
                        tooltipY: 0,
                        strokeOpacity: 0
                    });

                    series.data.setAll(data);

                    series.appear();

                    series.bullets.push(function () {
                        return am5.Bullet.new(root, {
                            locationY: 0,
                            sprite: am5.Label.new(root, {
                                text: "{valueY}",
                                fill: root.interfaceColors.get("alternativeText"),
                                centerY: 0,
                                centerX: am5.p50,
                                populateText: true
                            })
                        });
                    });

                    legend.data.push(series);
                }
            }


            let series2 = chart.series.push(
                am5xy.LineSeries.new(root, {
                    xAxis: xAxis,
                    yAxis: yAxis,
                    valueYField: "all",
                    categoryXField: "year",
                    tooltip: am5.Tooltip.new(root, {
                        pointerOrientation: "horizontal",
                        labelText: "{valueY}"
                    })
                })
            );

            series2.strokes.template.setAll({
                strokeWidth: 3,
                templateField: "strokeSettings"
            });


            series2.data.setAll(data);

            series2.bullets.push(function () {
                return am5.Bullet.new(root, {
                    sprite: am5.Circle.new(root, {
                        strokeWidth: 3,
                        stroke: series2.get("stroke"),
                        radius: 5,
                        fill: root.interfaceColors.get("background")
                    })
                });
            });

            chart.set("cursor", am5xy.XYCursor.new(root, {}));

            makeSeries1("학습수", "branch");
            // makeSeries("본부, 지역본부", "head");
            makeSeries1("전체", "all");


            chart.appear(1000, 100);
        }
