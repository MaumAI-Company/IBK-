        async function fn_search() {
            layerShow('loading');

            await new Promise(resolve => setTimeout(resolve, 100)); // 로딩 UI 업데이트 대기

            try {
                await Promise.all([fn_getStatisticInput(), fn_getStatisticOutput(), fn_createTable()]);
            } catch (error) {
                showAlert('warning', '실패하였습니다.');
            } finally {
                layerHide('loading');
            }
        }

        function fn_reset() {
            location.reload();
        }

        async function fn_getStatisticInput() {
            let jsonData = {
                "searchLearningType": $('#searchLearningType').val(),
                "searchTarget": $('#searchTarget').val(),
                "searchStartDate": $('#searchStartDate').val(),
                "searchEndDate": $('#searchEndDate').val(),
                "searchCycle": $('#searchCycle').val(),
            }

            $.ajax({
                url: "/soulGod/report/statistic/input",
                type: "post",
                async: false,
                data: JSON.stringify(jsonData),
                dataType: "json",
                contentType: "application/json",
                success: function (data) {
                    data.forEach(item => {
                        let strDate = item.dd.toString();
                        item.dd = fn_dateFormat(strDate);
                    });

                    inputData = data;
                    fn_drawChart1(data);
                },
                error: function () {
                    //console.log("error");
                }
            });
        }

        function fn_drawChart1(data) {
            $("#chartdiv1").html("");
            if (!data || data.length === 0) {

                return;
            }
            am5.array.each(am5.registry.rootElements, function (root) {
                if (root !== null && root != undefined) {
                    if (root.dom.id === 'chartdiv1')
                        root.dispose();
                }
                ;
            });

            let root = am5.Root.new("chartdiv1");

            root.setThemes([
                am5themes_Animated.new(root)
            ]);

            let chart = root.container.children.push(am5xy.XYChart.new(root, {
                panX: false,
                panY: false,
                paddingLeft: 0,
                wheelX: "panX",
                wheelY: "zoomX",
                layout: root.verticalLayout
            }));

                am5.Legend.new(root, {
                    centerX: am5.p50,
                    x: am5.p50
                })
            );

                cellStartLocation: 0.1,
                cellEndLocation: 0.9,
                minorGridEnabled: true
            })

            let xAxis = chart.xAxes.push(am5xy.CategoryAxis.new(root, {
                categoryField: "dd",
                renderer: xRenderer,
                tooltip: am5.Tooltip.new(root, {})
            }));

            xRenderer.grid.template.setAll({
                location: 1
            })

            xAxis.data.setAll(data);

            let yAxis = chart.yAxes.push(am5xy.ValueAxis.new(root, {
                renderer: am5xy.AxisRendererY.new(root, {
                    strokeOpacity: 0.1
                })
            }));

            function makeSeries1(name, fieldName) {
                let series;
                if (fieldName != 'total') {
                    series = chart.series.push(am5xy.ColumnSeries.new(root, {
                        name: name,
                        xAxis: xAxis,
                        yAxis: yAxis,
                        valueYField: fieldName,
                        categoryXField: "dd"
                    }));
                }

                if (series) {
                    series.columns.template.setAll({
                        tooltipText: "{valueY}개 / {per}%",
                        width: am5.percent(90),
                        tooltipY: 0,
                        strokeOpacity: 0
                    });

                    series.data.setAll(data);

                    series.appear();

                    series.bullets.push(function () {
                        return am5.Bullet.new(root, {
                            locationY: 0,
                            sprite: am5.Label.new(root, {
                                text: "{valueY}",
                                fill: root.interfaceColors.get("alternativeText"),
                                centerY: 0,
                                centerX: am5.p50,
                                populateText: true
                            })
                        });
                    });

                    legend.data.push(series);
                }
            }

            let series2 = chart.series.push(
                am5xy.LineSeries.new(root, {
                    xAxis: xAxis,
                    yAxis: yAxis,
                    valueYField: "total",
                    categoryXField: "dd",
                    tooltip: am5.Tooltip.new(root, {
                        pointerOrientation: "horizontal",
                        labelText: "{valueY}개"
                    })
                })
            );

            series2.strokes.template.setAll({
                strokeWidth: 3,
                templateField: "strokeSettings"
            });

            series2.data.setAll(data);

            series2.bullets.push(function () {
                return am5.Bullet.new(root, {
                    sprite: am5.Circle.new(root, {
                        strokeWidth: 3,
                        stroke: series2.get("stroke"),
                        radius: 5,
                        fill: root.interfaceColors.get("background")
                    })
                });
            });

            chart.set("cursor", am5xy.XYCursor.new(root, {}));

            makeSeries1("추론 데이터 수", "outCnt");
            makeSeries1("전체", "total");

            chart.appear(1000, 100);
        }

        function fn_createTable() {
            let tableBody = $("#tbody");
            tableBody.empty();

            // Input 대비 학습 통계 타이틀 : s
            let inputTitleRow = $('<tr><th colspan="' + (inputData.length + 1) + '" class="section-title">추론 결과 수 : INPUT 데이터 기반 OUTPUT 데이터 생성 개수</th></tr>');
            tableBody.append(inputTitleRow);

            let dateRow = $('<tr><th scope="row">날짜</th></tr>');
            let totalRow = $('<tr><th scope="row">전체</th></tr>');
            let outCntRow = $('<tr><th scope="row">학습수</th></tr>');
            let perRow = $('<tr><th scope="row" class="fc_primary">학습 비율</th></tr>');

            $.each(inputData, function (index, item) {
                dateRow.append(`<td>${item.dd}</td>`);
                totalRow.append(`<td>${fn_setCommas(item.total)}</td>`);
                outCntRow.append(`<td>${fn_setCommas(item.outCnt)}</td>`);
                perRow.append(`<td>${item.per}%</td>`);
            });
            tableBody.append(dateRow, totalRow, outCntRow, perRow);
            // Input 대비 학습 통계 타이틀 : e

            // 빈 행 추가
            let emptyRow = $('<tr><td colspan="' + (inputData.length + 1) + '"></td></tr>');
            tableBody.append(emptyRow);

            // Output 대비 적중 통계 타이틀 : s
            let outputTitleRow = $('<tr><th colspan="' + (outputData.length + 1) + '" class="section-title">사용자 활용 현황 : 추론된 OUTPUT 데이터의 실제 사용 개수</th></tr>');
            tableBody.append(outputTitleRow);

            let dateOutputRow = $('<tr><th scope="row">날짜</th></tr>');
            let totalOutputRow = $('<tr><th scope="row">전체</th></tr>');
            let hitCnt1Row = $('<tr><th scope="row">예산비목정보_적중수</th></tr>');
            let hitCnt1PerRow = $('<tr><th scope="row">예산비목정보_적중비율</th></tr>');
            let hitCnt2Row = $('<tr><th scope="row">예산사업ID_적중수</th></tr>');
            let hitCnt2PerRow = $('<tr><th scope="row">예산사업ID_적중비율</th></tr>');
            let hitCnt3Row = $('<tr><th scope="row">비목집행사유_적중수</th></tr>');
            let hitCnt3PerRow = $('<tr><th scope="row">비목집행사유_적중비율</th></tr>');

            $.each(outputData, function (index, item) {
                dateOutputRow.append(`<td>${item.dd}</td>`);
                totalOutputRow.append(`<td>${fn_setCommas(item.total)}</td>`);
                hitCnt1Row.append(`<td>${fn_setCommas(item.hitCnt1) || 0}</td>`);
                hitCnt1PerRow.append(`<td>${item.hitCnt1Per || 0}%</td>`);
                hitCnt2Row.append(`<td>${fn_setCommas(item.hitCnt2) || 0}</td>`);
                hitCnt2PerRow.append(`<td>${item.hitCnt2Per || 0}%</td>`);
                hitCnt3Row.append(`<td>${fn_setCommas(item.hitCnt3) || 0}</td>`);
                hitCnt3PerRow.append(`<td>${item.hitCnt3Per || 0}%</td>`);
            });
            tableBody.append(dateOutputRow, totalOutputRow, hitCnt1Row, hitCnt1PerRow, hitCnt2Row, hitCnt2PerRow, hitCnt3Row, hitCnt3PerRow);
            // Output 대비 적중 통계 타이틀 : e
        }

        function fn_excelDownload() {
            let fileNm = '통계정보_' + new Date().toISOString().replace(/\D/g, '').slice(2, 15);
            fnTableToExcel('table', fileNm);
        }

        function fn_dateFormat(date){
            if(date != null) {
                if (date.length === 8) {
                    return `${date.substring(0, 4)}.${date.substring(4, 6)}.${date.substring(6, 8)}`;
                } else if (date.length === 6) {
                    return `${date.substring(0, 4)}.${date.substring(4, 6)}`;
                } else {
                    return date;
                }
            } else {
                return date;
            }
        }
    </script>
</head>
<body>
<div id="wrap">
    <th:block th:insert="~{soulGod/fragments/header}"></th:block>

    <div id="container">
        <th:block th:insert="~{soulGod/fragments/lnb}"></th:block>

        <div class="contents">
            <div class="page_top">
                <div class="tit_area">
                    <h2 class="one_depth">지급결의 AI 적용 결과 조회</h2>
                    <h3 class="page_tit">기간별 통계</h3>
                </div>
                <div class="btn_area">
                    <button type="button" class="btn line_cool_grey30" onclick="fn_excelDownload()">
                        <span>통계정보 다운로드</span>
                    </button>
                </div>
            </div>

            <form id="form1">
                <div class="board_top">
                    <div class="mla">
                        <div class="filter_area">
                            <button type="button" class="btn btn_text btn_filter">
                                <i class="ico_filter"></i>
                                <span>필터</span>
                            </button>

                            <div class="filter">
                                <div class="inner">
                                    <dl>
                                        <dt>조회기간</dt>
                                        <dd>
                                            <div class="term_form">
                                                <label for="searchStartDate" class="blind">조회 시작 날짜</label>
                                                <input type="text" id="searchStartDate" class="datepicker"
                                                       th:value="${params.searchStartDate}" readonly>
                                                <div class="swung"></div>
                                                <label for="searchEndDate" class="blind">조회 종료 날짜</label>
                                                <input type="text" id="searchEndDate" class="datepicker"
                                                       th:value="${params.searchEndDate}" readonly>
                                            </div>
                                        </dd>
                                    </dl>
                                    <dl>
                                        <dt>
                                            <label for="searchLearningType">구분</label>
                                        </dt>
                                        <dd>
                                            <select name="searchLearningType" id="searchLearningType">
                                                <option th:each="item :${T(kr.co.ibk.domain.enums.LearningType).values()}"
                                                        th:class="${item}" th:text="${item.name}" th:value="${item}"
                                                        th:selected="${item.name() eq params.searchLearningType}"></option>
                                            </select>
                                        </dd>
                                    </dl>
                                    <dl>
                                        <dt>
                                            <label for="searchTarget">대상</label>
                                        </dt>
                                        <dd>
                                            <select name="searchTarget" id="searchTarget">
                                                <option value="" selected>전체</option>
                                                <option value="1" th:selected="${params.searchTarget == '1'}">본부
                                                </option>
                                                <option value="2" th:selected="${params.searchTarget == '2'}">영업점
                                                </option>
                                            </select>
                                        </dd>
                                    </dl>
                                    <dl>
                                        <dt>
                                            <label for="searchCycle">주기</label>
                                        </dt>
                                        <dd>
                                            <select name="searchCycle" id="searchCycle">
                                                <option value="1" th:selected="${params.searchCycle eq '1'}">일별</option>
                                                <option value="2" th:selected="${params.searchCycle eq '2'}">월별</option>
                                                <option value="3" th:selected="${params.searchCycle eq '3'}">연도별
                                                </option>
                                            </select>
                                        </dd>
                                    </dl>
                                    <div class="btn_area">
                                        <button type="button" class="btn line_cool_grey30" onclick="fn_reset()">
                                            <span>초기화</span>
                                        </button>
                                        <button type="button" class="btn fill" onclick="fn_search()">
                                            <span>검색</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>

            <div class="selected_filter"></div>

            <div class="graph_area">
                <div class="graph">
                    <div>추론 결과 수 : INPUT 데이터 기반 OUTPUT 데이터 생성 개수</div>
                    <div id="chartdiv1" style="height:366px"></div> <!--TODO : 임의 높이값-->
                </div>
            </div>

            <div class="graph_area">
                <div class="graph">
                    <div>사용자 활용 현황 : 추론된 OUTPUT 데이터의 실제 사용 개수</div>
                    <div id="chartdiv2" style="height:366px"></div> <!--TODO : 임의 높이값-->
                </div>
            </div>

            <div style="display: none;">
                <table class="tbl_list" id="table">
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<!--로딩중 : s-->
<div id="loading" class="loading_layer"> <!--노출 원할 시 클래스 active 추가-->
    <div class="loading">
        <p>Loading</p>
        <div class="loading_circle_rotate">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
    </div>
</div>
<!--로딩중 : e-->
</body>
</html>
