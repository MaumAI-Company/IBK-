<!DOCTYPE html>
<html lang="ko" xml:lang="ko" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{soulGod/fragments/head}"></th:block>
    <script type="text/javascript">
        $(function(){
        });
    </script>
</head>
<body>
<div id="wrap">
    <th:block th:insert="~{soulGod/fragments/header}"></th:block>

    <div id="container">
        <th:block th:insert="~{soulGod/fragments/lnb}"></th:block>

        <div class="contents">
            <div class="page_top">
                <div class="tit_area">
                    <h2 class="one_depth">Admin</h2>
                    <h3 class="page_tit">검증 설정<span class="arr"></span>검증 수준(Threshold) 설정</h3>
                </div>
            </div>

            <div class="box">
                <div>
                    <label for="prevLevel" class="blind">검증 수준(Threshold) 설정</label>
                    <select name="prevLevel" id="prevLevel">
                        <option value="" disabled selected>선택하세요.</option>
                        <option value="0.1">0.1</option>
                        <option value="0.2">0.2</option>
                        <option value="0.3">0.3</option>
                        <option value="0.4">0.4</option>
                        <option value="0.5">0.5</option>
                        <option value="0.6">0.6</option>
                        <option value="0.7">0.7</option>
                        <option value="0.8">0.8</option>
                        <option value="0.9">0.9</option>
                        <option value="0.10">1.0</option>
                    </select>
                    <span>or</span>
                    <div class="input">
                        <input type="text" placeholder="0.1 이상 부터 값을 입력하세요.">
                        <button type="button" class="btn_del" tabindex="-1">
                            <span class="blind">삭제</span>
                        </button>
                    </div>
                </div>
                <div class="btn_area">
                    <button type="button" class="btn fill">
                        <span>설정 저장</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
