spring.profiles.active=local
spring.security.headers.frame=false
server.port=18081

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

## MyBatis ##
mybatis.config-location=classpath:mybatis-config.xml
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.multiple-result-sets-enabled=false
#mybatis.configuration.map-underscore-to-camel-case=true
#mybatis.configuration.call-setters-on-nulls=true
#mybatis.configuration.jdbc-type-for-null=null
mybatis.configuration.default-fetch-size=500


spring.thymeleaf.enabled=true
spring.thymeleaf.encoding=UTF-8
##spring.thymeleaf.prefix=/templates
spring.thymeleaf.suffix=.html

#Mail Setting
spring.mail.host=outbound.daouoffice.com
spring.mail.port=25
spring.mail.username=test@ntoday.kr
spring.mail.password=ento135!
spring.mail.properties.mail.smtp.ssl.trust = outbound.daouoffice.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.timeout=5000

management.endpoints.web.base-path=/management
management.endpoints.web.exposure.include=*
#management.endpoints.enabled-by-default=false
management.endpoint.shutdown.enabled=false
management.endpoint.info.enabled=true
management.endpoint.health.show-details=always